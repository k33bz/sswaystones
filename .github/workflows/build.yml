name: build

on:
  push:
    branches: [main, '26.*']
  pull_request:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: gradle
      # Compile + unit tests + jar. spotless is intentionally EXCLUDED here: its
      # eclipse() JDT formatter is fetched at build time from download.eclipse.org,
      # whose p2 index is an external SPOF that intermittently 500s and would then
      # block an otherwise-green build. Formatting is still verified below in a
      # non-fatal step so it's visible when the endpoint is up.
      - name: Build + tests
        run: ./gradlew build -x spotlessJava -x spotlessCheck -x spotlessMisc
      - name: Spotless check (non-fatal — eclipse formatter is an external SPOF)
        continue-on-error: true
        run: ./gradlew spotlessCheck
      - name: Artifact slug
        run: echo "ARTIFACT_SLUG=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_ENV"
      - name: Upload jar
        uses: actions/upload-artifact@v7
        with:
          name: sswaystones-${{ env.ARTIFACT_SLUG }}
          path: build/libs/*.jar
